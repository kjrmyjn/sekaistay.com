<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background shape -->
  <rect width="400" height="300" rx="24" fill="#E5F4F5"/>

  <!-- House body -->
  <rect x="120" y="140" width="160" height="110" rx="8" fill="white" stroke="#167B81" stroke-width="3"/>
  <!-- Roof -->
  <path d="M100 150 L200 80 L300 150" stroke="#167B81" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M110 148 L200 85 L290 148" fill="#54BEC3" opacity="0.15"/>
  <!-- Door -->
  <rect x="180" y="195" width="40" height="55" rx="4" fill="#167B81"/>
  <circle cx="212" cy="224" r="3" fill="white"/>
  <!-- Windows -->
  <rect x="138" y="165" width="30" height="30" rx="4" fill="#E5F4F5" stroke="#259DA3" stroke-width="2"/>
  <line x1="153" y1="165" x2="153" y2="195" stroke="#259DA3" stroke-width="1.5"/>
  <line x1="138" y1="180" x2="168" y2="180" stroke="#259DA3" stroke-width="1.5"/>
  <rect x="232" y="165" width="30" height="30" rx="4" fill="#E5F4F5" stroke="#259DA3" stroke-width="2"/>
  <line x1="247" y1="165" x2="247" y2="195" stroke="#259DA3" stroke-width="1.5"/>
  <line x1="232" y1="180" x2="262" y2="180" stroke="#259DA3" stroke-width="1.5"/>

  <!-- Shield with check -->
  <g transform="translate(280, 90)">
    <path d="M30 5 L55 15 L55 35 C55 55 30 65 30 65 C30 65 5 55 5 35 L5 15 Z" fill="#167B81"/>
    <path d="M20 35 L27 42 L42 27" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="80" cy="120" r="6" fill="#54BEC3" opacity="0.3"/>
  <circle cx="65" cy="200" r="4" fill="#259DA3" opacity="0.2"/>
  <circle cx="340" cy="180" r="5" fill="#54BEC3" opacity="0.25"/>
  <circle cx="325" cy="230" r="3" fill="#259DA3" opacity="0.2"/>

  <!-- Gear icon (management) -->
  <g transform="translate(55, 85)">
    <circle cx="20" cy="20" r="10" stroke="#259DA3" stroke-width="2.5" fill="none"/>
    <circle cx="20" cy="20" r="4" fill="#259DA3"/>
    <line x1="20" y1="5" x2="20" y2="10" stroke="#259DA3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="20" y2="35" stroke="#259DA3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="10" y2="20" stroke="#259DA3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="35" y2="20" stroke="#259DA3" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
